<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F8FA">
<title>Bridge Retreat 2026 · 입장</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">

<style>
  main {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px 24px;
  }

  /* ─── Login form card ─── */
  .login-card {
    width: 100%; max-width: 360px; text-align: center;
  }
  .login-logo {
    width: 120px; height: auto; opacity: 0.4; filter: invert(1);
    margin-bottom: 24px;
  }
  .login-title {
    font-size: 11px; font-weight: 700; color: var(--ink-2);
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .login-heading {
    font-size: 24px; font-weight: 700; color: var(--ink);
    letter-spacing: -0.02em; margin-bottom: 6px;
  }
  .login-sub {
    font-size: 14px; font-weight: 500; color: var(--ink-3);
    line-height: 1.55; margin-bottom: 32px;
  }

  form .stack { display: flex; flex-direction: column; gap: 10px; }
  form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  form .btn { margin-top: 14px; }

  /* ─── Loading overlay ─── */
  .loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg-base);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    opacity: 0; visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }
  .loading-screen.visible { opacity: 1; visibility: visible; }
  .loading-screen img {
    width: 120px; height: auto;
    opacity: 0.5; filter: invert(1);
    animation: pulse 2s infinite ease-in-out;
  }
  .loading-screen .loading-text {
    font-size: 11px; font-weight: 700; color: var(--ink-2);
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.25; } }
</style>
</head>
<body>

<div class="mesh" aria-hidden="true"></div>

<!-- Loading screen (shown optimistically on submit) -->
<div class="loading-screen" id="loading-screen">
  <img src="assets/imgs/Bridge_retreat_logo.png" alt="">
  <div class="loading-text">확인 중…</div>
</div>

<main>
  <section class="login-card reveal d2">
    <img src="assets/imgs/Bridge_retreat_logo.png" alt="" class="login-logo">
    <div class="login-title">Bridge Retreat 2026</div>

    <form id="login-form" autocomplete="off">
      <div class="stack">
        <input
          class="field"
          type="text"
          id="name"
          name="name"
          placeholder="이름 (한글)"
          required
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false">
        <div class="row">
          <input
            class="field"
            type="number"
            id="month"
            name="month"
            placeholder="생일 (월)"
            min="1" max="12"
            inputmode="numeric"
            required>
          <input
            class="field"
            type="number"
            id="day"
            name="day"
            placeholder="생일 (일)"
            min="1" max="31"
            inputmode="numeric"
            required>
        </div>
        <button class="btn" type="submit" id="submit-btn">입장하기</button>
      </div>
      <div class="error-text" id="error" role="alert" aria-live="polite"></div>
    </form>
  </section>
</main>

<script type="module">
  import { loadRoster } from './assets/js/data.js';
  import { findMatch, setSession, getSession } from './assets/js/auth.js';

  // Already logged in? Skip straight to app.
  if (getSession()) location.replace('app.html');

  const form      = document.getElementById('login-form');
  const errorEl   = document.getElementById('error');
  const btn       = document.getElementById('submit-btn');
  const loading   = document.getElementById('loading-screen');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';

    const name  = document.getElementById('name').value;
    const month = document.getElementById('month').value;
    const day   = document.getElementById('day').value;

    // Optimistically show loading screen immediately
    loading.classList.add('visible');

    try {
      const roster = await loadRoster();
      const match  = findMatch(roster, name, month, day);

      if (!match) {
        // Not found — return to login
        loading.classList.remove('visible');
        errorEl.textContent = '명단에서 찾을 수 없어요. 이름과 생일을 다시 확인해 주세요.';
        return;
      }

      setSession(match);
      location.replace('app.html');
    } catch (err) {
      console.error(err);
      // Error — return to login
      loading.classList.remove('visible');
      errorEl.textContent = '연결에 문제가 있어요. 잠시 후 다시 시도해 주세요.';
    }
  });
</script>
</body>
</html>
