<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF9F7">
<title>Bridge Retreat 2026 · 입장</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">

<style>
  /* Login page: center the card vertically */
  main {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 16px;
  }

  .login {
    width: 100%;
    max-width: 380px;
    padding: 36px 28px 28px;
    background: var(--card);
    border-radius: 28px;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }
  .login::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(80% 60% at 100% 0%, rgba(212,166,145,0.18), transparent 60%),
      radial-gradient(60% 50% at 0% 100%, rgba(180,190,209,0.18), transparent 60%);
    pointer-events: none;
  }
  .login > * { position: relative; }

  .login .brand {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; color: var(--ink-3);
    margin-bottom: 22px;
  }
  .login .brand .logo {
    width: 22px; height: 22px; border-radius: 7px;
    background: linear-gradient(135deg, var(--peach), var(--rose), var(--lavender));
  }
  .login h1 {
    font-weight: 800; font-size: 30px; line-height: 1.15;
    letter-spacing: -0.03em; color: var(--ink);
    margin-bottom: 6px;
  }
  .login .sub {
    font-size: 14px; color: var(--ink-3); line-height: 1.55;
    margin-bottom: 26px;
  }

  form .stack { display: flex; flex-direction: column; gap: 10px; }
  form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  form .btn { margin-top: 14px; }
</style>
</head>
<body>

<div class="mesh" aria-hidden="true"></div>

<main>
  <section class="login reveal d2">
    <div class="brand"><span class="logo"></span>Bridge Retreat 2026</div>
    <h1>안녕하세요!</h1>
    <p class="sub">이름과 생일(월/일)을 입력하면<br>입장하실 수 있어요.</p>

    <form id="login-form" autocomplete="off">
      <div class="stack">
        <input
          class="field"
          type="text"
          id="name"
          name="name"
          placeholder="이름 (한글)"
          required
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false">
        <div class="row">
          <input
            class="field"
            type="number"
            id="month"
            name="month"
            placeholder="월"
            min="1" max="12"
            inputmode="numeric"
            required>
          <input
            class="field"
            type="number"
            id="day"
            name="day"
            placeholder="일"
            min="1" max="31"
            inputmode="numeric"
            required>
        </div>
        <button class="btn" type="submit" id="submit-btn">입장하기</button>
      </div>
      <div class="error-text" id="error" role="alert" aria-live="polite"></div>
    </form>
  </section>
</main>

<script type="module">
  import { loadRoster } from './assets/js/data.js';
  import { findMatch, setSession, getSession } from './assets/js/auth.js';

  // Already logged in? Skip straight to app.
  if (getSession()) location.replace('app.html');

  const form    = document.getElementById('login-form');
  const errorEl = document.getElementById('error');
  const btn     = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';

    const name  = document.getElementById('name').value;
    const month = document.getElementById('month').value;
    const day   = document.getElementById('day').value;

    btn.disabled    = true;
    btn.textContent = '확인 중...';

    try {
      const roster = await loadRoster();
      const match  = findMatch(roster, name, month, day);

      if (!match) {
        errorEl.textContent = '명단에서 찾을 수 없어요. 이름과 생일을 다시 확인해 주세요.';
        btn.disabled    = false;
        btn.textContent = '입장하기';
        return;
      }

      setSession(match);
      location.replace('app.html');
    } catch (err) {
      console.error(err);
      errorEl.textContent = '연결에 문제가 있어요. 잠시 후 다시 시도해 주세요.';
      btn.disabled    = false;
      btn.textContent = '입장하기';
    }
  });
</script>
</body>
</html>
