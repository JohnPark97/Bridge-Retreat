<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F8FA">
<title>Layout 3 - Journal</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="../assets/css/tokens.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/components.css">
<style>
  .journal-hero {
    margin: 64px 24px 24px; text-align: center;
  }
  .journal-hero .date { font-size: 12px; font-weight: 700; color: var(--ink-3); letter-spacing: 0.1em; margin-bottom: 24px; text-transform: uppercase; }
  .journal-hero blockquote { font-family: "Georgia", serif; font-size: 28px; line-height: 1.4; color: var(--ink); margin-bottom: 16px; font-style: italic; }
  .journal-hero cite { font-size: 13px; font-weight: 600; color: var(--ink-4); }

  .journal-meta {
    margin: 0 24px 32px; text-align: center;
  }
  
  /* 15m Alert Banner */
  .alert-banner {
    margin: 0 24px 32px; padding: 16px 20px;
    background: #F0F2F4; color: var(--ink);
    border-radius: 16px; box-shadow: 0 4px 12px -4px rgba(34,34,34,0.05);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .alert-banner .icon {
    width: 20px; height: 20px; flex-shrink: 0;
    color: var(--ink-3);
    animation: pulse 2.5s infinite;
  }
  .alert-banner .content .title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .alert-banner .content .desc { font-size: 13px; font-weight: 500; opacity: 0.9; line-height: 1.4; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .journal-meta .name { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .journal-meta .details {
    font-size: 13px; font-weight: 600; color: var(--ink-3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .journal-meta .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-4); }

  .segmented-agenda {
    margin: 0 24px 24px;
  }
  .segment-title { font-size: 18px; font-weight: 800; color: var(--ink); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
  
  .ev.minimal { padding: 12px 0; display: flex; align-items: baseline; gap: 16px; background: transparent; }
  .ev.minimal::before { display: none; } /* Remove the black line from components.css */
  .ev.minimal .time { font-size: 14px; font-weight: 700; color: var(--ink-3); width: 44px; flex-shrink: 0; }
  .ev.minimal .title { font-size: 16px; font-weight: 600; color: var(--ink); flex: 1; }
  .ev.minimal .place { font-size: 12px; font-weight: 600; color: var(--ink-4); background: none; box-shadow: none; padding: 0; }
  
  /* Active state fix */
  .ev.minimal.now { padding: 12px 16px; margin: 0 -16px; background: var(--bg-accent-soft); border-radius: 12px; }
  .ev.minimal.now .time { color: var(--signal); }
  .ev.minimal.now .title { font-weight: 800; }
  .ev.minimal.now .place { color: var(--ink-3); } /* Better contrast on grey bg */

  .action-bar {
    margin: 32px 24px 24px;
    display: flex; align-items: stretch;
  }
  .action-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    padding: 16px; border: none; background: transparent; color: var(--ink-2);
    font-size: 12px; font-weight: 700; font-family: inherit;
  }
  .action-item svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .action-bar .divider { width: 1px; background: var(--line); margin: 12px 0; }

  body { padding-bottom: 90px; }
</style>
</head>
<body>
  <div class="mesh" aria-hidden="true"></div>
  <header class="topbar reveal d1" style="background:transparent; border:none; box-shadow:none;">
    <span class="brand" style="opacity:0.5;"><span class="logo"></span>Bridge Retreat</span>
  </header>

  <main id="content">
    <section class="journal-hero reveal d2">
      <div class="date">May 29, 2026 · Day 01</div>
      <blockquote>"말세에 내가 내 영을<br>모든 육체에 부어 주리니"</blockquote>
      <cite>사도행전 2:17</cite>
    </section>

    <div class="journal-meta reveal d3">
      <div class="name">박종혁 님</div>
      <div class="details">301호<span class="sep"></span>7조</div>
    </div>

    <!-- 15m Alert Banner -->
    <div class="alert-banner reveal d4">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
      <div class="content">
        <div class="title">환영 예배 시작 15분 전</div>
        <div class="desc">곧 본당에서 예배가 시작됩니다. 늦지 않게 이동해주세요.</div>
      </div>
    </div>

    <section class="segmented-agenda reveal d5">
      <div class="segment-title">오후</div>
      <div class="ev minimal past">
        <span class="time">15:00</span>
        <span class="title">도착 및 체크인</span>
        <span class="place">로비</span>
      </div>
      <div class="ev minimal now">
        <span class="time">16:00</span>
        <span class="title">개회 예배</span>
        <span class="place">본당</span>
      </div>
      
      <div class="segment-title" style="margin-top:32px;">저녁</div>
      <div class="ev minimal">
        <span class="time">18:00</span>
        <span class="title">저녁 식사</span>
        <span class="place">식당</span>
      </div>
      <div class="ev minimal">
        <span class="time">19:30</span>
        <span class="title">환영 예배</span>
        <span class="place">본당</span>
      </div>
    </section>

    <div class="action-bar reveal d5">
      <div class="action-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        전체 일정
      </div>
      <div class="divider"></div>
      <div class="action-item">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        내 조원
      </div>
    </div>
  </main>
</body>
</html>
