<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F8FA">
  <meta name="robots" content="noindex,nofollow">
  <title>Bridge Retreat · Admin</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>

<body>

<div id="splash" style="position:fixed; inset:0; z-index:9999; background:var(--bg-base); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; transition:opacity 0.6s ease, visibility 0.6s ease;">
  <img src="assets/imgs/Bridge retreat logo.webp" alt="" style="width:80px; height:auto; opacity:0.12; filter:invert(1);">
  <div style="font-size:11px; font-weight:700; color:var(--ink-4); letter-spacing:0.15em; text-transform:uppercase;">Admin</div>
</div>

<div class="mesh" aria-hidden="true"></div>

<main>
  <header class="topbar reveal d1">
    <span class="brand"><img src="assets/imgs/Bridge ministry logo.webp" alt="" class="logo">Bridge Retreat <span style="color:var(--ink-3);font-weight:500;">· 관리자</span></span>
  </header>

  <div id="content"></div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module" src="assets/js/admin.js"></script>
</body>

</html>
