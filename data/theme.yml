title: Bridge Retreat 2026
dates:
  start: 2026-05-29
  end:   2026-05-31
theme:
  ko: 충만
  en: Overflow
verse:
  reference_ko: 사도행전 2:17
  reference_en: Acts 2:17
  text_ko: 말세에 내가 내 영을 모든 육체에 부어 주리니
  text_en: I will pour out my Spirit on all people.
  emphasis: 부어 주리니
verses:
  - text_ko: "말세에 내가 내 영을 모든 육체에 부어 주리니"
    reference_ko: "사도행전 2:17"
  - text_ko: "오직 성령이 너희에게 임하시면 너희가 권능을 받고"
    reference_ko: "사도행전 1:8"
  - text_ko: "그런즉 너희가 악한 자라도 좋은 것으로 자녀에게 줄 줄 알거든 하물며 하늘 아버지께서 구하는 자에게 성령을 주시지 않겠느냐"
    reference_ko: "누가복음 11:13"
  - text_ko: "내가 그리스도와 함께 십자가에 못 박혔나니 그런즉 이제는 내가 사는 것이 아니요 오직 내 안에 그리스도께서 사시는 것이라"
    reference_ko: "갈라디아서 2:20"
  - text_ko: "너희는 세상의 빛이라 산 위에 있는 동네가 숨겨지지 못할 것이요"
    reference_ko: "마태복음 5:14"
