<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF9F7">
<title>Bridge Retreat 2026</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
</head>
<body>

<div class="mesh" aria-hidden="true"></div>

<main>
  <header class="topbar reveal d1">
    <span class="brand"><span class="logo"></span>Bridge Retreat 2026</span>
    <span class="day" id="day-pill">—</span>
  </header>

  <section id="home"     class="tab-panel"></section>
  <section id="schedule" class="tab-panel" hidden></section>
  <section id="group"    class="tab-panel" hidden></section>
</main>

<nav class="tabbar" aria-label="주요 탭">
  <button class="tab" data-tab="home">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 12L12 3l9 9"/>
      <path d="M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10"/>
    </svg>
    홈
  </button>
  <button class="tab" data-tab="schedule">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <path d="M16 2v4M8 2v4M3 10h18"/>
    </svg>
    일정
  </button>
  <button class="tab" data-tab="group">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
    </svg>
    내 그룹
  </button>
</nav>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module" src="assets/js/app.js"></script>
</body>
</html>
